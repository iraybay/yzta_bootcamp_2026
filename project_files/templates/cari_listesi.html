<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Listesi - Bulutİş ERP</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark-mode">
    <!-- Background Ambient Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <a href="/" class="btn-back-home"><i class="fa-solid fa-arrow-left"></i></a>
                <div class="app-logo" style="margin-left: 20px;">
                    <i class="fa-solid fa-layer-group logo-icon"></i>
                    <span class="logo-text">Bulut<span class="logo-accent">İş</span></span>
                </div>
            </div>
            <div class="header-right">
                <span class="page-indicator" style="font-family: var(--font-heading); font-weight: 700; color: var(--text-primary);"><i class="fa-solid fa-users"></i> Cari Hesaplar Listesi</span>
            </div>
        </header>

        <!-- Cari Metrics Section -->
        <section class="cari-metrics-row">
            <div class="metric-card shadow-sm">
                <div class="metric-icon-box m-orange"><i class="fa-solid fa-user-group"></i></div>
                <div class="metric-info">
                    <span class="label">Müşteri Sayısı</span>
                    <span class="value" id="totalMusteri">0</span>
                </div>
            </div>
            <div class="metric-card shadow-sm">
                <div class="metric-icon-box m-blue"><i class="fa-solid fa-truck-field"></i></div>
                <div class="metric-info">
                    <span class="label">Tedarikçi Sayısı</span>
                    <span class="value" id="totalTedarikci">0</span>
                </div>
            </div>
            <div class="metric-card shadow-sm">
                <div class="metric-icon-box m-green"><i class="fa-solid fa-scale-balanced"></i></div>
                <div class="metric-info">
                    <span class="label">Net Cari Denge</span>
                    <span class="value" id="netDenge">0.00 TL</span>
                </div>
            </div>
        </section>

        <!-- Main Content (Cari Table) -->
        <main class="cari-list-card">
            <div class="table-actions-bar">
                <div class="search-box-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchCariInput" placeholder="Cari adı / ünvanı ile arayın..." onkeyup="filterCariList()">
                </div>
                <div class="filter-box-wrapper">
                    <label for="filterCariType"><i class="fa-solid fa-filter"></i> Filtrele:</label>
                    <select id="filterCariType" onchange="filterCariList()">
                        <option value="all">Tüm Cariler</option>
                        <option value="musteri">Sadece Müşteriler</option>
                        <option value="tedarikci">Sadece Tedarikçiler</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table class="cari-data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ünvan / Cari Adı</th>
                            <th>Cari Tipi</th>
                            <th>Kredibilite</th>
                            <th>Yetkili Kişi</th>
                            <th>Telefon</th>
                            <th>Bakiye / Limit</th>
                        </tr>
                    </thead>
                    <tbody id="cariTableBody">
                        <tr>
                            <td colspan="7" class="text-center py-4"><i class="fa-solid fa-spinner fa-spin"></i> Yükleniyor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Custom styling just for table layout to make it look premium -->
    <style>
        .app-container {
            padding: 0 20px 20px 20px !important;
        }
        .app-header {
            padding: 12px 18px !important;
            margin: 10px 0 14px 0 !important;
        }
        .btn-back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 120, 212, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-smooth);
        }
        .btn-back-home:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .link-hover {
            color: var(--primary-color);
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .link-hover:hover {
            color: var(--orange-primary);
            text-decoration: underline;
        }
        .cari-metrics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }
        .metric-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-md);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .metric-icon-box {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .m-orange { background: rgba(255, 140, 0, 0.1); color: var(--orange-primary); }
        .m-blue { background: rgba(0, 120, 212, 0.1); color: var(--blue-primary); }
        .m-green { background: rgba(16, 185, 129, 0.1); color: var(--green-primary); }
        
        .metric-info .label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .metric-info .value {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .cari-list-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-md);
            padding: 16px 20px;
            box-shadow: var(--card-shadow);
        }
        .table-actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .search-box-wrapper {
            flex: 1;
            min-width: 280px;
            position: relative;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 8px 18px 8px 40px;
        }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }
        .search-box-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 13px;
        }
        .filter-box-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .filter-box-wrapper select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .table-container {
            overflow-x: auto;
        }
        .cari-data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }
        .cari-data-table th {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-bottom: 2px solid var(--border-color);
        }
        .cari-data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .cari-data-table tbody tr {
            transition: var(--transition-smooth);
        }
        .cari-data-table tbody tr {
            transition: var(--transition-smooth);
        }
        .cari-data-table tbody tr:hover {
            background: rgba(0, 120, 212, 0.08) !important;
            transform: scale(1.005);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        
        .badge-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
        }
        .bg-musteri { background: rgba(255, 140, 0, 0.12); color: var(--orange-primary); }
        .bg-tedarikci { background: rgba(0, 120, 212, 0.12); color: var(--blue-primary); }
        
        .bal-positive { color: var(--green-primary); font-weight: 700; }
        .bal-negative { color: var(--danger-color); font-weight: 700; }
        
        .text-center { text-align: center; }
        .py-4 { padding-top: 24px; padding-bottom: 24px; }
        
        @media (max-width: 768px) {
            .cari-metrics-row {
                grid-template-columns: 1fr;
            }
            .table-actions-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>

    <!-- Client-side script to handle API fetches and real-time operations -->
    <script>
        let allCariler = [];

        // Check if dark mode is active from localStorage
        if (localStorage.getItem('theme') !== 'light') {
            document.body.classList.add('dark-mode');
            document.body.classList.remove('light-mode');
        } else {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
        }

        // Fetch data on load
        window.addEventListener('DOMContentLoaded', async () => {
            await fetchMetrics();
            await fetchCariList();
        });

        async function fetchMetrics() {
            try {
                const res = await fetch('/api/dashboard');
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                document.getElementById('totalMusteri').textContent = data.cari.musteri_sayisi;
                document.getElementById('totalTedarikci').textContent = data.cari.tedarikci_sayisi;
                
                const net = data.cari.toplam_alacak - data.cari.toplam_borc;
                const netEl = document.getElementById('netDenge');
                netEl.textContent = formatCurrency(net);
                if (net >= 0) {
                    netEl.className = 'value bal-positive';
                } else {
                    netEl.className = 'value bal-negative';
                }
            } catch (err) {
                console.error("Metrikler yüklenirken hata oluştu:", err);
            }
        }

        async function fetchCariList() {
            const tbody = document.getElementById('cariTableBody');
            try {
                const res = await fetch('/api/cari/tum-liste');
                if (!res.ok) throw new Error();
                const json = await res.json();
                
                allCariler = json.data;
                renderTable(allCariler);
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4" style="color: var(--danger-color);"><i class="fa-solid fa-triangle-exclamation"></i> Veriler yüklenemedi.</td></tr>`;
            }
        }

        function renderTable(list) {
            const tbody = document.getElementById('cariTableBody');
            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4">Kayıtlı cari bulunamadı.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = '';
            list.forEach(c => {
                const tr = document.createElement('tr');
                const isMusteri = c.tip === 'musteri';
                const typeLabel = isMusteri ? 'Müşteri' : 'Tedarikçi';
                const typeClass = isMusteri ? 'bg-musteri' : 'bg-tedarikci';
                const balClass = isMusteri ? 'bal-positive' : 'bal-negative';
                const prefix = isMusteri ? '+' : '-';
                
                // Determine credibility styling
                const k = c.kredibilite || 'A';
                let kredBadge = '';
                if (k === 'A+') {
                    kredBadge = `<span class="badge-type" style="background: rgba(16, 185, 129, 0.12); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.2);">${k}</span>`;
                } else if (k === 'A') {
                    kredBadge = `<span class="badge-type" style="background: rgba(0, 120, 212, 0.12); color: var(--primary-color); border: 1px solid rgba(0, 120, 212, 0.2);">${k}</span>`;
                } else if (k === 'B') {
                    kredBadge = `<span class="badge-type" style="background: rgba(245, 158, 11, 0.12); color: var(--warning-color); border: 1px solid rgba(245, 158, 11, 0.2);">${k}</span>`;
                } else {
                    kredBadge = `<span class="badge-type" style="background: rgba(239, 68, 68, 0.12); color: var(--danger-color); border: 1px solid rgba(239, 68, 68, 0.2);">${k}</span>`;
                }
                
                tr.innerHTML = `
                    <td><strong>#${c.id}</strong></td>
                    <td><strong class="link-hover">${c.ad}</strong></td>
                    <td><span class="badge-type ${typeClass}">${typeLabel}</span></td>
                    <td>${kredBadge}</td>
                    <td>${c.yetkili_kisi || '-'}</td>
                    <td>${c.telefon || '-'}</td>
                    <td class="${balClass}">${prefix}${formatCurrency(c.limit_val)}</td>
                `;
                tr.onclick = () => { location.href = `/cari-detay/${c.id}`; };
                tbody.appendChild(tr);
            });
        }

        function filterCariList() {
            const query = document.getElementById('searchCariInput').value.toLowerCase().trim();
            const typeFilter = document.getElementById('filterCariType').value;
            
            const filtered = allCariler.filter(c => {
                const nameMatch = c.ad.toLowerCase().startsWith(query);
                const yetkiliMatch = c.yetkili_kisi && c.yetkili_kisi.toLowerCase().startsWith(query);
                const matchesSearch = nameMatch || yetkiliMatch;
                
                const matchesType = typeFilter === 'all' || c.tip === typeFilter;
                return matchesSearch && matchesType;
            });
            
            // Sort by ID ASC
            filtered.sort((a, b) => a.id - b.id);
            
            renderTable(filtered);
        }

        function showCariDetail(id) {
            const c = allCariler.find(item => item.id === id);
            if (!c) return;
            
            const isMusteri = c.tip === 'musteri';
            const typeLabel = isMusteri ? 'Müşteri' : 'Tedarikçi';
            
            // Construct full address representation
            let fullAddress = '';
            if (c.mahalle || c.ilce || c.il) {
                fullAddress += `${c.mahalle || ''} ${c.ilce || ''} / ${c.il || ''}`.trim();
            }
            if (c.adres_detay) {
                fullAddress += (fullAddress ? ', ' : '') + c.adres_detay;
            }
            if (!fullAddress) fullAddress = '-';
            
            Swal.fire({
                title: `Cari Hesap Detay Kartı`,
                html: `
                    <div style="text-align: left; font-size: 13px; line-height: 1.8; color: var(--text-primary);">
                        <p style="border-bottom: 1px solid var(--border-color); padding-bottom: 6px; margin-bottom: 8px; font-size: 14px;">
                            <strong>Cari Ünvanı:</strong> ${c.ad}
                        </p>
                        <p><strong>Cari Tipi:</strong> ${typeLabel}</p>
                        <p><strong>Cari Grubu / Sektör:</strong> ${c.cari_grubu || '-'}</p>
                        <p><strong>Vergi No / TC Kimlik:</strong> ${c.vergi_no || '-'}</p>
                        <p><strong>Vergi Dairesi:</strong> ${c.vergi_dairesi || '-'}</p>
                        <p><strong>Yetkili Kişi:</strong> ${c.yetkili_kisi || '-'}</p>
                        <p><strong>E-Posta Adresi:</strong> ${c.eposta || '-'}</p>
                        <p><strong>Telefon Numarası:</strong> ${c.telefon || '-'}</p>
                        <p><strong>Açık Adres:</strong> ${fullAddress}</p>
                        <p style="border-top: 1px solid var(--border-color); padding-top: 8px; margin-top: 8px; font-size: 14px;">
                            <strong>Devir Bakiyesi / Limit:</strong> 
                            <span style="font-weight: bold; color: ${isMusteri ? 'var(--green-primary)' : 'var(--danger-color)'}">
                                ${isMusteri ? '+' : '-'}${formatCurrency(c.limit_val)}
                            </span>
                        </p>
                    </div>
                `,
                icon: 'info',
                confirmButtonColor: '#0078d4'
            });
        }

        function formatCurrency(val) {
            return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(val);
        }
    </script>
</body>
</html>
