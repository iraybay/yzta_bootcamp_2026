<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Son İşlemler & Özet - Bulutİş ERP</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Theme CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="dark-mode">
    <!-- Background Ambient Orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <a href="/" class="btn-back-home"><i class="fa-solid fa-arrow-left"></i></a>
                <div class="app-logo" style="margin-left: 20px;">
                    <i class="fa-solid fa-layer-group logo-icon"></i>
                    <span class="logo-text">Bulut<span class="logo-accent">İş</span></span>
                </div>
            </div>
            <div class="header-right">
                <span class="page-indicator" style="font-family: var(--font-heading); font-weight: 700; color: var(--text-primary);"><i class="fa-solid fa-clock-rotate-left"></i> Cari Son İşlemler & Özet</span>
            </div>
        </header>

        <!-- Net Status Metrics Row at the Top -->
        <section class="summary-metrics-row">
            <div class="metric-card shadow-sm">
                <div class="metric-icon-box m-green"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                <div class="metric-info">
                    <span class="label">Toplam Alacak (Müşteriler)</span>
                    <span class="value val-green" id="totalAlacak">0.00 TL</span>
                </div>
            </div>
            <div class="metric-card shadow-sm">
                <div class="metric-icon-box m-red"><i class="fa-solid fa-money-bill-wave"></i></div>
                <div class="metric-info">
                    <span class="label">Toplam Borç (Tedarikçiler)</span>
                    <span class="value val-red" id="totalBorc">0.00 TL</span>
                </div>
            </div>
            <div class="metric-card shadow-sm">
                <div class="metric-icon-box m-orange"><i class="fa-solid fa-scale-balanced"></i></div>
                <div class="metric-info">
                    <span class="label">Net Cari Durum (Denge)</span>
                    <span class="value" id="netDurum">0.00 TL</span>
                </div>
            </div>
        </section>

        <!-- Transactions Table Card -->
        <main class="transactions-list-card">
            <div class="card-header-bar">
                <h3><i class="fa-solid fa-list-ul icon-orange"></i> Cari İşlem Geçmişi (<span id="islemCount">0</span> Kayıt) [ <span id="dateRangeText" style="color: var(--primary-color); font-weight: 700;">-</span> ]</h3>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary);"><i class="fa-regular fa-calendar-days"></i> Tarih Aralığı:</label>
                    <input type="date" id="startDateIslem" onchange="fetchRecentTransactions()" style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--card-border); border-radius: 8px; padding: 6px 10px; font-size: 12px; outline: none; font-family: var(--font-body);">
                    <span style="color: var(--text-secondary); font-size: 12px;">-</span>
                    <input type="date" id="endDateIslem" onchange="fetchRecentTransactions()" style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--card-border); border-radius: 8px; padding: 6px 10px; font-size: 12px; outline: none; font-family: var(--font-body);">
                </div>
            </div>
            <div class="table-container">
                <table class="islem-data-table">
                    <thead>
                        <tr>
                            <th>Tarih</th>
                            <th>İşlem / Tanım</th>
                            <th>Tutar / İşlem Yönü (TRY)</th>
                        </tr>
                    </thead>
                    <tbody id="islemTableBody">
                        <tr>
                            <td colspan="3" class="text-center py-4"><i class="fa-solid fa-spinner fa-spin"></i> İşlemler yükleniyor...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Custom inline styles for this layout -->
    <style>
        .app-container {
            padding: 0 20px 20px 20px !important;
        }
        .app-header {
            padding: 12px 18px !important;
            margin: 10px 0 14px 0 !important;
        }
        .btn-back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 120, 212, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-smooth);
        }
        .btn-back-home:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .summary-metrics-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }
        .metric-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-md);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .metric-icon-box {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .m-orange { background: rgba(255, 140, 0, 0.1); color: var(--orange-primary); }
        .m-blue { background: rgba(0, 120, 212, 0.1); color: var(--blue-primary); }
        .m-green { background: rgba(16, 185, 129, 0.1); color: var(--green-primary); }
        .m-red { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        
        .metric-info .label {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .metric-info .value {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .transactions-list-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-md);
            padding: 16px 20px;
            box-shadow: var(--card-shadow);
        }
        .card-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header-bar select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 50px;
            color: var(--text-primary);
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        .card-header-bar h3 {
            font-family: var(--font-heading);
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-container {
            overflow-x: auto;
        }
        .islem-data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 12px;
        }
        .islem-data-table th {
            font-family: var(--font-heading);
            font-weight: 700;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-bottom: 2px solid var(--border-color);
        }
        .islem-data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .islem-data-table tbody tr:hover {
            background: rgba(0, 120, 212, 0.03);
        }

        .badge-type {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
        }
        .bg-alacak { background: rgba(16, 185, 129, 0.12); color: var(--green-primary); }
        .bg-borc { background: rgba(239, 68, 68, 0.12); color: var(--danger-color); }
        
        .val-green { color: var(--green-primary); font-weight: 700; }
        .val-red { color: var(--danger-color); font-weight: 700; }
        .val-positive { color: var(--green-primary); font-weight: 700; }
        .val-negative { color: var(--danger-color); font-weight: 700; }

        .text-center { text-align: center; }
        .py-4 { padding-top: 24px; padding-bottom: 24px; }

        @media (max-width: 768px) {
            .summary-metrics-row {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <!-- Client Script to load and query database reports -->
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.body.classList.add('dark-mode');
            document.body.classList.remove('light-mode');
        } else {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
        }

        function formatDateText(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return `${parts[2]}.${parts[1]}.${parts[0]}`;
            }
            return dateStr;
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Set default date range to the beginning of this month to today
            document.getElementById('startDateIslem').value = "2026-07-01";
            document.getElementById('endDateIslem').value = "2026-07-18";
            fetchRecentTransactions();
        });

        async function fetchRecentTransactions() {
            try {
                const startDate = document.getElementById('startDateIslem').value;
                const endDate = document.getElementById('endDateIslem').value;
                
                // Show date range in title
                const startFormatted = formatDateText(startDate);
                const endFormatted = formatDateText(endDate);
                document.getElementById('dateRangeText').textContent = `${startFormatted} - ${endFormatted}`;

                const response = await fetch(`/api/cari/hareketler?start_date=${startDate}&end_date=${endDate}`);
                if (!response.ok) throw new Error();
                const json = await response.json();
                
                // Update metrics summary
                document.getElementById('totalAlacak').textContent = formatCurrency(json.total_alacak);
                document.getElementById('totalBorc').textContent = formatCurrency(json.total_borc);
                
                const netVal = json.net_denge;
                const netEl = document.getElementById('netDurum');
                netEl.textContent = formatCurrency(netVal);
                if (netVal >= 0) {
                    netEl.className = 'value val-green';
                } else {
                    netEl.className = 'value val-red';
                }
                
                // Update count badge
                document.getElementById('islemCount').textContent = json.liste.length;
                
                // Render table
                renderTable(json.liste);
                
            } catch (err) {
                const tbody = document.getElementById('islemTableBody');
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4" style="color: var(--danger-color);"><i class="fa-solid fa-circle-exclamation"></i> Veriler yüklenemedi.</td></tr>`;
            }
        }

        function renderTable(list) {
            const tbody = document.getElementById('islemTableBody');
            if (!list || list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4">Herhangi bir cari işlem kaydı bulunamadı.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = '';
            list.forEach(item => {
                const tr = document.createElement('tr');
                const isAlacak = item.tip === 'alacak';
                
                const sign = isAlacak ? '+' : '-';
                const amountColor = isAlacak ? 'val-green' : 'val-red';
                const tipBadge = isAlacak
                    ? '<span class="badge-type bg-alacak"><i class="fa-solid fa-arrow-trend-up"></i> Alacak</span>'
                    : '<span class="badge-type bg-borc"><i class="fa-solid fa-arrow-trend-down"></i> Borç</span>';
                
                // Format Date representation YYYY-MM-DD -> DD.MM.YYYY
                const dateParts = item.tarih.split('-');
                const formattedDate = dateParts.length === 3 ? `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}` : item.tarih;
                
                tr.innerHTML = `
                    <td><strong>${formattedDate}</strong></td>
                    <td><strong>${item.tanim}</strong></td>
                    <td><span class="${amountColor}">${sign}${formatCurrency(item.tutar)}</span> ${tipBadge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function formatCurrency(val) {
            return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY' }).format(val);
        }
    </script>
</body>
</html>
